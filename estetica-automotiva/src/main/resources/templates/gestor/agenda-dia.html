<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Agenda do Dia', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i data-lucide="calendar"></i> Agenda do Dia</h1>
            <p class="page-subtitle" th:text="${#temporals.format(data, 'EEEE, dd/MM/yyyy')}"></p>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <form th:action="@{/gestor/agenda/dia}" method="get" class="d-flex gap-2">
                <input type="date" name="data" class="form-control"
                       th:value="${data}" style="max-width:180px;"/>
                <button type="submit" class="btn btn-dark">
                    <i data-lucide="search"></i>
                </button>
            </form>
            <a th:href="@{/gestor/agenda/semana}" class="btn btn-outline-secondary">
                <i data-lucide="calendar-range"></i> Ver Semana
            </a>
        </div>
    </div>

    <!-- NAVEGAÇÃO DE DIA -->
    <div class="d-flex gap-2 mb-4">
        <a th:href="@{/gestor/agenda/dia(data=${data.minusDays(1)})}" class="btn btn-sm btn-outline-secondary">
            <i data-lucide="chevron-left"></i> Dia anterior
        </a>
        <a th:href="@{/gestor/agenda/dia}" class="btn btn-sm btn-dark">Hoje</a>
        <a th:href="@{/gestor/agenda/dia(data=${data.plusDays(1)})}" class="btn btn-sm btn-outline-secondary">
            Próximo dia <i data-lucide="chevron-right"></i>
        </a>
    </div>

    <div th:if="${#lists.isEmpty(agendamentos)}" class="form-card text-center py-5">
        <i data-lucide="coffee" style="width:48px;height:48px;color:var(--border-dark);margin-bottom:1rem;"></i>
        <h5 class="fw-bold">Nenhum agendamento neste dia</h5>
        <p class="text-muted small">Dia livre!</p>
    </div>

    <div th:if="${!#lists.isEmpty(agendamentos)}">
        <div th:each="a : ${agendamentos}"
             th:class="'agenda-card status-' + ${a.status.name().toLowerCase()}">
            <div class="d-flex align-items-start gap-3 flex-wrap">
                <div class="agenda-horario" th:text="${#temporals.format(a.horario, 'HH:mm')}"></div>

                <div class="flex-grow-1">
                    <div class="fw-bold" th:text="${a.clienteNome}"></div>
                    <div class="d-flex gap-4 mt-2 flex-wrap">
                        <div>
                            <div class="agenda-info-label">Serviço</div>
                            <div class="agenda-info-value" th:text="${a.servicoNome}"></div>
                        </div>
                        <div>
                            <div class="agenda-info-label">Placa</div>
                            <div><span class="placa-tag" th:text="${a.placa}"></span></div>
                        </div>
                        <div th:if="${a.observacao != null && !a.observacao.isBlank()}">
                            <div class="agenda-info-label">Obs.</div>
                            <div class="agenda-info-value" th:text="${a.observacao}"></div>
                        </div>
                    </div>
                </div>

                <div class="d-flex flex-column align-items-end gap-2">
                    <span th:class="'badge-status badge-' + ${a.status.name().toLowerCase()}"
                          th:text="${a.status.name()}"></span>

                    <div class="d-flex gap-1 flex-wrap justify-content-end">
                        <a th:href="@{'/gestor/agendamentos/' + ${a.id} + '/editar'}"
                           class="btn btn-sm btn-outline-primary">
                            <i data-lucide="pencil"></i>
                        </a>
                        <form th:action="@{'/gestor/agendamentos/' + ${a.id} + '/confirmar'}" method="post"
                              class="d-inline" th:if="${a.status.name() == 'PENDENTE'}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-sm btn-success" type="submit">
                                <i data-lucide="check"></i> Confirmar
                            </button>
                        </form>
                        <form th:action="@{'/gestor/agendamentos/' + ${a.id} + '/concluir'}" method="post"
                              class="d-inline" th:if="${a.status.name() == 'CONFIRMADO'}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-sm btn-dark" type="submit">
                                <i data-lucide="check-check"></i> Concluir
                            </button>
                        </form>
                        <form th:action="@{'/gestor/agendamentos/' + ${a.id} + '/cancelar'}" method="post"
                              class="d-inline"
                              th:if="${a.status.name() != 'CANCELADO' && a.status.name() != 'CONCLUIDO'}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-sm btn-outline-danger" type="submit"
                                    onclick="return confirm('Cancelar este agendamento?')">
                                <i data-lucide="x-circle"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
