<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Serviços', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i data-lucide="wrench"></i> Serviços</h1>
            <p class="page-subtitle">Gerencie os serviços oferecidos</p>
        </div>
    </div>

    <div class="row g-4">

        <!-- FORMULÁRIO -->
        <div class="col-lg-4">
            <div class="form-card">
                <div class="section-title">
                    <i data-lucide="plus-circle"></i>
                    <span th:text="${servico.id != null && !#strings.isEmpty(servico.id)} ? 'Editar Serviço' : 'Novo Serviço'"></span>
                </div>
                <form th:action="@{/gestor/servicos/salvar}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <!--
                        Só envia o id se existir — evita enviar id="" que quebra o MongoDB
                    -->
                    <th:block th:if="${servico.id != null && !#strings.isEmpty(servico.id)}">
                        <input type="hidden" name="id" th:value="${servico.id}"/>
                        <input type="hidden" name="ativo" th:value="${servico.ativo}"/>
                    </th:block>

                    <div class="mb-3">
                        <label class="form-label">Nome do Serviço</label>
                        <input type="text" name="nome" class="form-control"
                               th:value="${servico.nome}"
                               placeholder="Ex: Lavagem Completa" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea name="descricao" class="form-control" rows="3"
                                  placeholder="Descreva o serviço..."
                                  th:text="${servico.descricao}" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Preço (R$)</label>
                        <div class="input-group">
                            <span class="input-group-text">R$</span>
                            <input type="number" name="preco" class="form-control"
                                   th:value="${servico.preco}"
                                   placeholder="0.00" step="0.01" min="0.01" required/>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Duração na agenda</label>
                        <select name="duracaoHoras" class="form-select" required>
                            <option value="1" th:selected="${servico.duracaoHoras == 1}">1 hora</option>
                            <option value="2" th:selected="${servico.duracaoHoras == 2}">2 horas</option>
                            <option value="3" th:selected="${servico.duracaoHoras == 3}">3 horas</option>
                            <option value="4" th:selected="${servico.duracaoHoras == 4}">4 horas</option>
                        </select>
                        <small class="text-muted">Define quantos slots de horário o serviço ocupa na agenda.</small>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i data-lucide="save"></i> Salvar
                        </button>
                        <a th:href="@{/gestor/servicos}" class="btn btn-outline-secondary">
                            <i data-lucide="x"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- LISTA -->
        <div class="col-lg-8">
            <div class="table-card">
                <div class="table-card-header">
                    <span class="fw-bold">Serviços Cadastrados</span>
                </div>

                <div th:if="${#lists.isEmpty(servicos)}" class="empty-state">
                    <i data-lucide="package-x"></i>
                    <h5>Nenhum serviço cadastrado</h5>
                </div>

                <div th:if="${!#lists.isEmpty(servicos)}" class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Preço</th>
                                <th>Duração</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${servicos}">
                                <td>
                                    <div class="fw-semibold" th:text="${s.nome}"></div>
                                    <small class="text-muted" th:text="${s.descricao}"></small>
                                </td>
                                <td class="fw-bold">
                                    R$ <span th:text="${#numbers.formatDecimal(s.preco, 1, 2, 'COMMA')}"></span>
                                </td>
                                <td>
                                    <span class="badge-status badge-confirmado"
                                          th:text="${s.duracaoHoras} + 'h'"></span>
                                </td>
                                <td>
                                    <span th:class="${s.ativo} ? 'badge-status badge-ativo' : 'badge-status badge-inativo'"
                                          th:text="${s.ativo} ? 'Ativo' : 'Inativo'"></span>
                                </td>
                                <td>
                                    <div class="d-flex gap-1 flex-wrap">
                                        <a th:href="@{'/gestor/servicos/' + ${s.id} + '/editar'}"
                                           class="btn btn-sm btn-outline-primary">
                                            <i data-lucide="pencil"></i>
                                        </a>

                                        <form th:if="${s.ativo}"
                                              th:action="@{'/gestor/servicos/' + ${s.id} + '/desativar'}"
                                              method="post" class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-warning"
                                                    onclick="return confirm('Desativar este serviço?')"
                                                    title="Desativar">
                                                <i data-lucide="archive"></i>
                                            </button>
                                        </form>

                                        <form th:if="${!s.ativo}"
                                              th:action="@{'/gestor/servicos/' + ${s.id} + '/reativar'}"
                                              method="post" class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-success"
                                                    title="Reativar">
                                                <i data-lucide="rotate-ccw"></i>
                                            </button>
                                        </form>

                                        <form th:action="@{'/gestor/servicos/' + ${s.id} + '/excluir'}"
                                              method="post" class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                                    onclick="return confirm('Excluir permanentemente? Esta ação não pode ser desfeita.')"
                                                    title="Excluir definitivamente">
                                                <i data-lucide="trash-2"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

</div>
</body>
</html>
