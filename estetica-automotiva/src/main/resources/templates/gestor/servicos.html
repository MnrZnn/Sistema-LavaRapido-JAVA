<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Serviços', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i data-lucide="wrench"></i> Serviços</h1>
            <p class="page-subtitle">Gerencie os serviços oferecidos</p>
        </div>
    </div>

    <div class="row g-4">

        <!-- FORMULARIO -->
        <div class="col-lg-4">
            <div class="form-card">
                <div class="section-title">
                    <i data-lucide="plus-circle"></i>
                    <span th:text="${servico.id != null} ? 'Editar Serviço' : 'Novo Serviço'"></span>
                </div>
                <form th:action="@{/gestor/servicos/salvar}" method="post" th:object="${servico}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" th:field="*{id}"/>
                    <div class="mb-3">
                        <label class="form-label">Nome do Serviço</label>
                        <input type="text" th:field="*{nome}" class="form-control"
                               placeholder="Ex: Lavagem Completa" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea th:field="*{descricao}" class="form-control" rows="3"
                                  placeholder="Descreva o serviço..." required></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Preço (R$)</label>
                        <div class="input-group">
                            <span class="input-group-text">R$</span>
                            <input type="number" th:field="*{preco}" class="form-control"
                                   placeholder="0.00" step="0.01" min="0.01" required/>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i data-lucide="save"></i> Salvar
                        </button>
                        <a th:href="@{/gestor/servicos}" class="btn btn-outline-secondary">
                            <i data-lucide="x"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- LISTA -->
        <div class="col-lg-8">
            <div class="table-card">
                <div class="table-card-header">
                    <span class="fw-bold">Serviços Cadastrados</span>
                </div>

                <div th:if="${#lists.isEmpty(servicos)}" class="empty-state">
                    <i data-lucide="package-x"></i>
                    <h5>Nenhum serviço cadastrado</h5>
                </div>

                <div th:if="${!#lists.isEmpty(servicos)}" class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Descrição</th>
                                <th>Preço</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${servicos}">
                                <td class="fw-semibold" th:text="${s.nome}"></td>
                                <td class="text-muted" th:text="${s.descricao}"></td>
                                <td class="fw-bold">
                                    R$ <span th:text="${#numbers.formatDecimal(s.preco, 1, 2, 'COMMA')}"></span>
                                </td>
                                <td>
                                    <span th:class="${s.ativo} ? 'badge-status badge-ativo' : 'badge-status badge-inativo'"
                                          th:text="${s.ativo} ? 'Ativo' : 'Inativo'"></span>
                                </td>
                                <td>
                                    <div class="d-flex gap-2">
                                        <a th:href="@{'/gestor/servicos/' + ${s.id} + '/editar'}"
                                           class="btn btn-sm btn-outline-primary">
                                            <i data-lucide="pencil"></i>
                                        </a>
                                        <form th:action="@{'/gestor/servicos/' + ${s.id} + '/excluir'}" method="post"
                                              class="d-inline" th:if="${s.ativo}">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                                    onclick="return confirm('Desativar este serviço?')">
                                                <i data-lucide="archive"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

</div>
</body>
</html>
