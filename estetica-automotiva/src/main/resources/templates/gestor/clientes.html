<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Clientes', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i data-lucide="users"></i> Clientes</h1>
            <p class="page-subtitle">Gerencie os clientes cadastrados</p>
        </div>
    </div>

    <div class="table-card">
        <div class="table-card-header">
            <span class="fw-bold" th:text="${clientes.size()} + ' cliente(s) encontrado(s)'"></span>
        </div>

        <div th:if="${#lists.isEmpty(clientes)}" class="empty-state">
            <i data-lucide="user-x"></i>
            <h5>Nenhum cliente cadastrado</h5>
            <p>Os clientes aparecerão aqui após se cadastrarem.</p>
        </div>

        <div th:if="${!#lists.isEmpty(clientes)}" class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Telefone</th>
                        <th>E-mail</th>
                        <th>Veículos</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${clientes}">
                        <td class="fw-semibold" th:text="${c.nome}"></td>
                        <td class="cpf-masked" th:text="${c.cpfMascarado}">
                            <!-- CPF mascarado conforme LGPD -->
                        </td>
                        <td th:text="${c.telefone}"></td>
                        <td th:text="${c.email}"></td>
                        <td>
                            <span th:each="p : ${c.placas}" class="placa-tag me-1" th:text="${p}"></span>
                            <span th:if="${#lists.isEmpty(c.placas)}" class="text-muted small">—</span>
                        </td>
                        <td>
                            <form th:action="@{'/gestor/clientes/' + ${c.id} + '/excluir'}" method="post"
                                  class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Excluir permanentemente este cliente? Esta ação não pode ser desfeita.')">
                                    <i data-lucide="trash-2"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="p-3 border-top" style="background:var(--amarelo-light);">
            <small class="text-muted d-flex align-items-center gap-2">
                <i data-lucide="shield-check" style="width:14px;height:14px;"></i>
                <strong>LGPD:</strong> CPFs exibidos de forma parcial. Dados sensíveis protegidos conforme Lei 13.709/2018.
            </small>
        </div>
    </div>

</div>
</body>
</html>
