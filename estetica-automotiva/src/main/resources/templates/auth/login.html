<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | AutoBrilho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">

<div class="auth-box">

    <!-- CABEÇALHO -->
    <div class="auth-header">
        <div class="auth-logo-wrap">
            <!--
                LOGO: Substitua o div abaixo por:
                <img src="/img/logo.png" class="auth-logo-img" alt="AutoBrilho">

                Arquivo em: src/main/resources/static/img/logo.png
            -->
            <div class="auth-logo-icon">
                <i data-lucide="car" style="width:26px;height:26px;color:#111;"></i>
            </div>
            <div class="text-start">
                <div class="auth-brand-name">AutoBrilho</div>
                <div class="auth-brand-sub">Estética Automotiva</div>
            </div>
        </div>
        <p class="auth-subtitle">Acesse sua conta para continuar</p>
    </div>

    <!-- CARD DE LOGIN -->
    <div class="auth-card">

        <div th:if="${param.logout}" class="alert alert-success mb-3">
            <i data-lucide="check-circle-2"></i> Sessão encerrada com sucesso.
        </div>
        <div th:if="${param.erro}" class="alert alert-danger mb-3">
            <i data-lucide="alert-circle"></i> E-mail ou senha inválidos.
        </div>
        <div th:if="${param.expirado}" class="alert alert-warning mb-3">
            <i data-lucide="clock"></i> Sessão expirada. Faça login novamente.
        </div>
        <div th:if="${sucesso}" class="alert alert-success mb-3">
            <i data-lucide="check-circle-2"></i>
            <span th:text="${sucesso}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i data-lucide="mail" style="width:15px;height:15px;"></i>
                    </span>
                    <input type="email" name="email" class="form-control"
                           placeholder="seuemail@exemplo.com" required autofocus/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i data-lucide="lock" style="width:15px;height:15px;"></i>
                    </span>
                    <input type="password" name="senha" id="senhaInput" class="form-control"
                           placeholder="Digite sua senha" required/>
                    <button class="input-group-text border-start-0" type="button"
                            onclick="toggleSenha()" style="cursor:pointer;">
                        <i data-lucide="eye" id="iconOlho" style="width:15px;height:15px;"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-auth">
                <i data-lucide="log-in"></i> Entrar
            </button>
        </form>

    </div>

    <div class="auth-footer">
        Não tem conta? <a th:href="@{/cadastro}">Criar conta gratuita</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
    lucide.createIcons();
    function toggleSenha() {
        const input = document.getElementById('senhaInput');
        const icon = document.getElementById('iconOlho');
        if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }
</script>
</body>
</html>
