<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cadastro | AutoBrilho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">

<div class="auth-box" style="max-width:520px;">

    <div class="auth-header">
        <div class="auth-logo-wrap">
            <!--
                LOGO: Substitua pelo <img src="/img/logo.png" class="auth-logo-img" alt="AutoBrilho">
                Arquivo em: src/main/resources/static/img/logo.png
            -->
            <div class="auth-logo-icon">
                <i data-lucide="car" style="width:26px;height:26px;color:#111;"></i>
            </div>
            <div class="text-start">
                <div class="auth-brand-name">AutoBrilho</div>
                <div class="auth-brand-sub">Estética Automotiva</div>
            </div>
        </div>
        <p class="auth-subtitle">Crie sua conta e agende seus serviços</p>
    </div>

    <div class="auth-card">

        <div th:if="${erro}" class="alert alert-danger mb-3">
            <i data-lucide="alert-circle"></i>
            <span th:text="${erro}"></span>
        </div>

        <form th:action="@{/cadastro}" method="post" th:object="${cliente}" novalidate>

            <div class="row g-3 mb-3">
                <div class="col-12">
                    <label class="form-label">Nome completo</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i data-lucide="user" style="width:14px;height:14px;"></i>
                        </span>
                        <input type="text" th:field="*{nome}" class="form-control"
                               placeholder="Seu nome completo" required/>
                    </div>
                    <div th:if="${#fields.hasErrors('nome')}" class="text-danger small mt-1"
                         th:errors="*{nome}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">CPF</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i data-lucide="id-card" style="width:14px;height:14px;"></i>
                        </span>
                        <input type="text" th:field="*{cpf}" class="form-control"
                               placeholder="000.000.000-00" maxlength="14" required/>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Telefone</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i data-lucide="phone" style="width:14px;height:14px;"></i>
                        </span>
                        <input type="text" th:field="*{telefone}" class="form-control"
                               placeholder="(11) 99999-9999" required/>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i data-lucide="mail" style="width:14px;height:14px;"></i>
                        </span>
                        <input type="email" th:field="*{email}" class="form-control"
                               placeholder="seuemail@exemplo.com" required/>
                    </div>
                    <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1"
                         th:errors="*{email}"></div>
                </div>

                <div class="col-12">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i data-lucide="lock" style="width:14px;height:14px;"></i>
                        </span>
                        <input type="password" th:field="*{senha}" id="senhaInput" class="form-control"
                               placeholder="Mínimo 6 caracteres" required minlength="6"/>
                        <button class="input-group-text border-start-0" type="button"
                                onclick="toggleSenha()" style="cursor:pointer;">
                            <i data-lucide="eye" id="iconOlho" style="width:14px;height:14px;"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- PLACAS -->
            <div class="mb-3">
                <label class="form-label">Placas dos veículos</label>
                <div id="placasContainer">
                    <div class="input-group mb-2">
                        <span class="input-group-text">
                            <i data-lucide="car" style="width:14px;height:14px;"></i>
                        </span>
                        <input type="text" name="placas" class="form-control"
                               placeholder="Ex: ABC-1234" maxlength="8"
                               style="text-transform:uppercase;"/>
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="adicionarPlaca()">
                    <i data-lucide="plus"></i> Adicionar placa
                </button>
            </div>

            <hr style="border-color:var(--border); margin: 1.25rem 0;"/>

            <!-- TERMOS DE SERVIÇO — OBRIGATÓRIO (LGPD) -->
            <div class="mb-4 p-3 rounded"
                 style="background:var(--amarelo-light); border:1px solid var(--amarelo-border);">
                <div class="d-flex align-items-start gap-2">
                    <input type="checkbox" class="form-check-input mt-1 flex-shrink-0"
                           id="termosCheck" required
                           style="width:18px;height:18px;accent-color:var(--amarelo);cursor:pointer;"/>
                    <label class="form-check-label small" for="termosCheck"
                           style="color:var(--text-main); line-height:1.5;">
                        Li e aceito os
                        <a href="/termos" target="_blank"
                           style="color:var(--preto);font-weight:700;text-decoration:underline;">
                            Termos de Serviço e Política de Privacidade
                        </a>
                        da AutoBrilho, incluindo o tratamento dos meus dados pessoais conforme a
                        <strong>Lei Geral de Proteção de Dados (LGPD — Lei nº 13.709/2018)</strong>.
                    </label>
                </div>
                <p class="small mb-0 mt-2" style="color:var(--text-sub); font-size:0.75rem;">
                    <i data-lucide="shield-check" style="width:12px;height:12px;vertical-align:middle;"></i>
                    Seus dados são usados exclusivamente para gerenciamento de agendamentos.
                </p>
            </div>

            <button type="submit" class="btn btn-auth" id="btnCadastrar" disabled>
                <i data-lucide="user-plus"></i> Criar minha conta
            </button>
        </form>
    </div>

    <div class="auth-footer">
        Já tem conta? <a th:href="@{/login}">Fazer login</a>
        &bull;
        <a href="/termos" target="_blank" style="opacity:0.7;">Termos de Serviço</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
    lucide.createIcons();

    const termosCheck = document.getElementById('termosCheck');
    const btnCadastrar = document.getElementById('btnCadastrar');

    termosCheck.addEventListener('change', function () {
        btnCadastrar.disabled = !this.checked;
        btnCadastrar.style.opacity = this.checked ? '1' : '0.5';
    });

    function toggleSenha() {
        const input = document.getElementById('senhaInput');
        const icon = document.getElementById('iconOlho');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.setAttribute('data-lucide', input.type === 'password' ? 'eye' : 'eye-off');
        lucide.createIcons();
    }
</script>
</body>
</html>
