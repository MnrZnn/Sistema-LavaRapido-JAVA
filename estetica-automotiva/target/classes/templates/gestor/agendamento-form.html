<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Editar Agendamento', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="page-header">
        <div>
            <h1 class="page-title"><i data-lucide="pencil"></i> Editar Agendamento</h1>
            <p class="page-subtitle">Altere os dados do agendamento</p>
        </div>
        <a th:href="@{/gestor/agenda/dia}" class="btn btn-outline-secondary">
            <i data-lucide="arrow-left"></i> Voltar
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="form-card">
                <form th:action="@{'/gestor/agendamentos/' + ${agendamento.id} + '/editar'}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="section-title">
                        <i data-lucide="user"></i> Cliente
                    </div>
                    <p class="fw-semibold mb-3" th:text="${agendamento.clienteNome}"></p>

                    <div class="section-title">
                        <i data-lucide="wrench"></i> Serviço
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Serviço</label>
                        <select name="servicoId" id="servicoGestor" class="form-select" required
                                onchange="atualizarHorariosGestor()">
                            <option th:each="s : ${servicos}"
                                    th:value="${s.id}"
                                    th:text="${s.nome} + ' (' + ${s.duracaoHoras} + 'h)'"
                                    th:selected="${agendamento.servicoId == s.id}"></option>
                        </select>
                    </div>

                    <div class="section-title">
                        <i data-lucide="calendar"></i> Data e Horário
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Data</label>
                            <input type="date" name="data" id="dataGestor" class="form-control"
                                   th:value="${agendamento.data}" th:min="${hoje}" required
                                   onchange="atualizarHorariosGestor()"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Horário</label>
                            <select name="horario" id="horarioGestor" class="form-select" required>
                                <option th:each="h : ${horarios}"
                                        th:value="${h}" th:text="${h}"
                                        th:selected="${agendamento.horario != null && agendamento.horario.toString().startsWith(h)}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Placa</label>
                        <input type="text" name="placa" class="form-control"
                               th:value="${agendamento.placa}" style="text-transform:uppercase;" required/>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Observação</label>
                        <textarea name="observacao" class="form-control" rows="2"
                                  th:text="${agendamento.observacao}"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i data-lucide="save"></i> Salvar Alterações
                        </button>
                        <a th:href="@{/gestor/agenda/dia}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
<script>
// atualiza horários ao trocar data ou serviço
function atualizarHorariosGestor() {
    const servicoId = document.getElementById('servicoGestor').value;
    const data = document.getElementById('dataGestor').value;
    const select = document.getElementById('horarioGestor');
    if (!servicoId || !data) return;

    const agendamentoId = '[[${agendamento.id}]]';
    select.innerHTML = '<option value="">Carregando...</option>';
    fetch('/agendamento/horarios-disponiveis?servicoId=' + servicoId + '&data=' + data)
        .then(r => r.json())
        .then(horarios => {
            select.innerHTML = '';
            horarios.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h;
                opt.textContent = h;
                select.appendChild(opt);
            });
            if (horarios.length === 0) {
                select.innerHTML = '<option value="">Nenhum horário disponível</option>';
            }
        });
}
</script>
</body>
</html>
