<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Dashboard Gestor', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="welcome-card mb-4">
        <div class="welcome-badge">Gestor</div>
        <h2>Painel de Controle</h2>
        <p>Gerencie clientes, serviços e agendamentos da AutoBrilho.</p>
    </div>

    <!-- STATS -->
    <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="users"></i></div>
                <div>
                    <div class="stat-label">Clientes</div>
                    <div class="stat-value" th:text="${totalClientes}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="wrench"></i></div>
                <div>
                    <div class="stat-label">Serviços</div>
                    <div class="stat-value" th:text="${totalServicos}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="calendar-check"></i></div>
                <div>
                    <div class="stat-label">Agendamentos</div>
                    <div class="stat-value" th:text="${totalAgendamentos}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="sun"></i></div>
                <div>
                    <div class="stat-label">Hoje</div>
                    <div class="stat-value" th:text="${agendaHoje.size()}">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- AGENDA DE HOJE -->
    <div class="table-card">
        <div class="table-card-header">
            <span class="fw-bold d-flex align-items-center gap-2">
                <i data-lucide="sun" style="width:16px;height:16px;color:var(--amarelo);filter:brightness(0.7);"></i>
                Agenda de Hoje
            </span>
            <div class="d-flex gap-2">
                <a th:href="@{/gestor/agenda/dia}" class="btn btn-sm btn-outline-primary">Ver completa</a>
                <a th:href="@{/gestor/agenda/semana}" class="btn btn-sm btn-dark">Ver semana</a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(agendaHoje)}" class="empty-state">
            <i data-lucide="coffee"></i>
            <h5>Nenhum agendamento hoje</h5>
            <p>Aproveite o dia tranquilo!</p>
        </div>

        <div th:if="${!#lists.isEmpty(agendaHoje)}" class="p-3">
            <div th:each="a : ${agendaHoje}"
                 th:class="'agenda-card status-' + ${a.status.name().toLowerCase()}">
                <div class="d-flex align-items-center gap-3">
                    <div class="agenda-horario" th:text="${#temporals.format(a.horario, 'HH:mm')}"></div>
                    <div class="flex-grow-1">
                        <div class="agenda-info-value" th:text="${a.clienteNome}"></div>
                        <div class="d-flex gap-3 mt-1">
                            <div>
                                <div class="agenda-info-label">Serviço</div>
                                <div class="agenda-info-value" th:text="${a.servicoNome}"></div>
                            </div>
                            <div>
                                <div class="agenda-info-label">Placa</div>
                                <div><span class="placa-tag" th:text="${a.placa}"></span></div>
                            </div>
                        </div>
                    </div>
                    <span th:class="'badge-status badge-' + ${a.status.name().toLowerCase()}"
                          th:text="${a.status.name()}"></span>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
