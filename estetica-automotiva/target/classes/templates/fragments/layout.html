<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="html(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | AutoBrilho'">AutoBrilho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid d-flex align-items-center justify-content-between flex-nowrap">

        <!--
            LOGO: Substitua o div brand-logo-placeholder por:
            <img src="/img/logo.png" class="brand-logo" alt="AutoBrilho">
            Arquivo em: src/main/resources/static/img/logo.png
        -->
        <span class="d-flex align-items-center gap-2 flex-shrink-0">
            <th:block sec:authorize="hasRole('GESTOR')">
                <a class="d-flex align-items-center gap-2 text-decoration-none" th:href="@{/gestor/dashboard}">
                    <div class="brand-logo-placeholder">
                        <i data-lucide="car" style="width:20px;height:20px;color:#111;"></i>
                    </div>
                    <div>
                        <div class="brand-name">AutoBrilho</div>
                        <div class="brand-sub">Estética Automotiva</div>
                    </div>
                </a>
            </th:block>
            <th:block sec:authorize="hasRole('CLIENTE')">
                <a class="d-flex align-items-center gap-2 text-decoration-none" th:href="@{/cliente/dashboard}">
                    <div class="brand-logo-placeholder">
                        <i data-lucide="car" style="width:20px;height:20px;color:#111;"></i>
                    </div>
                    <div>
                        <div class="brand-name">AutoBrilho</div>
                        <div class="brand-sub">Estética Automotiva</div>
                    </div>
                </a>
            </th:block>
        </span>

        <div class="navbar-links d-flex align-items-center gap-4">

            <th:block sec:authorize="hasRole('GESTOR')">
                <a th:href="@{/gestor/dashboard}" class="nav-link-custom">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a th:href="@{/gestor/clientes}" class="nav-link-custom">
                    <i data-lucide="users"></i> Clientes
                </a>
                <a th:href="@{/gestor/servicos}" class="nav-link-custom">
                    <i data-lucide="wrench"></i> Serviços
                </a>
                <a th:href="@{/gestor/agenda/dia}" class="nav-link-custom">
                    <i data-lucide="calendar"></i> Agenda
                </a>
                <a th:href="@{/gestor/estatisticas}" class="nav-link-custom">
                    <i data-lucide="bar-chart-2"></i> Estatísticas
                </a>
                <a th:href="@{/gestor/agendamentos/avulso}" class="btn-nav-destaque">
                    <i data-lucide="plus"></i> Avulso
                </a>
            </th:block>

            <th:block sec:authorize="hasRole('CLIENTE')">
                <a th:href="@{/cliente/dashboard}" class="nav-link-custom">
                    <i data-lucide="layout-dashboard"></i> Início
                </a>
                <a th:href="@{/agendamento}" class="nav-link-custom">
                    <i data-lucide="calendar-check"></i> Meus Agendamentos
                </a>
                <a th:href="@{/agendamento/novo}" class="btn-nav-destaque">
                    <i data-lucide="plus"></i> Novo Agendamento
                </a>
                <a th:href="@{/cliente/perfil}" class="nav-link-custom">
                    <i data-lucide="user-circle"></i> Perfil
                </a>
            </th:block>

            <th:block sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" class="d-inline m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="nav-link-custom border-0 bg-transparent p-0 cursor-pointer">
                        <i data-lucide="log-out"></i> Sair
                    </button>
                </form>
            </th:block>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 mt-3" th:if="${sucesso}">
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        <i data-lucide="check-circle-2"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
</div>
<div class="container-fluid px-4 mt-3" th:if="${erro}">
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i data-lucide="alert-circle"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container-fluid px-4 py-4">
    <th:block th:replace="${content}"></th:block>
</main>

<footer class="footer">
    <div class="container text-center py-1">
        <span class="text-muted">
            <span class="text-amarelo fw-semibold">AutoBrilho</span> &mdash; Estética Automotiva
        </span>
        <span class="text-muted mx-2">&bull;</span>
        <a th:href="@{/termos}" class="text-muted small" style="text-decoration:none;opacity:0.7;">
            <i data-lucide="shield" style="width:12px;height:12px;vertical-align:middle;"></i>
            Termos de Serviço e Privacidade
        </a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
