<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Agendamento', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="page-header">
        <div>
            <h1 class="page-title">
                <i data-lucide="calendar-plus"></i>
                <span th:text="${agendamento.id != null} ? 'Editar Agendamento' : 'Novo Agendamento'"></span>
            </h1>
            <p class="page-subtitle">Escolha o serviço, data e horário</p>
        </div>
        <a th:href="@{/agendamento}" class="btn btn-outline-secondary">
            <i data-lucide="arrow-left"></i> Voltar
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-card">

                <form th:action="${agendamento.id != null} ? @{'/agendamento/' + ${agendamento.id} + '/editar'} : @{/agendamento/novo}"
                      method="post" id="formAgendamento">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <!-- SERVIÇO -->
                    <div class="section-title">
                        <i data-lucide="wrench"></i> Selecione o Serviço
                    </div>
                    <div class="row g-3 mb-4" id="servicosGrid">
                        <div th:each="s : ${servicos}" class="col-md-4">
                            <div class="servico-card servico-selecionavel"
                                 th:data-id="${s.id}"
                                 th:classappend="${agendamento.servicoId == s.id} ? ' selecionado' : ''"
                                 onclick="selecionarServico(this)">
                                <div class="servico-icon">
                                    <i data-lucide="sparkles"></i>
                                </div>
                                <div class="servico-nome" th:text="${s.nome}"></div>
                                <div class="servico-desc" th:text="${s.descricao}"></div>
                                <div class="d-flex justify-content-between align-items-center mt-1">
                                    <span class="servico-preco">
                                        R$ <span th:text="${#numbers.formatDecimal(s.preco, 1, 2, 'COMMA')}"></span>
                                    </span>
                                    <span class="badge-status badge-confirmado"
                                          th:text="${s.duracaoHoras} + 'h'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" name="servicoId" id="servicoIdInput"
                           th:value="${agendamento.servicoId}"/>

                    <!-- DATA E HORÁRIO -->
                    <div class="section-title mt-2">
                        <i data-lucide="calendar"></i> Data e Horário
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Data</label>
                            <input type="date" name="data" id="dataInput" class="form-control"
                                   th:value="${agendamento.data}"
                                   th:min="${hoje}" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Horário</label>
                            <select name="horario" id="horarioSelect" class="form-select" required>
                                <option value="">Selecione serviço e data primeiro</option>
                                <th:block th:if="${!horarios.isEmpty()}">
                                    <th:block th:each="h : ${horarios}">
                                        <option th:value="${h}" th:text="${h}"
                                                th:selected="${agendamento.horario != null && agendamento.horario.toString().startsWith(h)}">
                                        </option>
                                    </th:block>
                                </th:block>
                            </select>
                        </div>
                    </div>

                    <!-- VEÍCULO -->
                    <div class="section-title">
                        <i data-lucide="car"></i> Veículo
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Placa</label>
                            <div th:if="${!#lists.isEmpty(placas)}">
                                <select name="placa" class="form-select" required>
                                    <option value="">Selecione a placa</option>
                                    <option th:each="p : ${placas}" th:value="${p}" th:text="${p}"
                                            th:selected="${agendamento.placa == p}"></option>
                                    <option value="outra">Outra placa</option>
                                </select>
                            </div>
                            <div th:if="${#lists.isEmpty(placas)}">
                                <input type="text" name="placa" class="form-control"
                                       th:value="${agendamento.placa}"
                                       placeholder="Ex: ABC-1234"
                                       style="text-transform:uppercase;" required/>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observação (opcional)</label>
                            <textarea name="observacao" class="form-control" rows="2"
                                      placeholder="Alguma observação sobre o serviço?"
                                      th:text="${agendamento.observacao}"></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i data-lucide="check"></i> Confirmar Agendamento
                        </button>
                        <a th:href="@{/agendamento}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
<script>
function selecionarServico(card) {
    document.querySelectorAll('.servico-selecionavel').forEach(c => c.classList.remove('selecionado'));
    card.classList.add('selecionado');
    document.getElementById('servicoIdInput').value = card.dataset.id;
    atualizarHorarios();
}

function atualizarHorarios() {
    const servicoId = document.getElementById('servicoIdInput').value;
    const data = document.getElementById('dataInput').value;
    const select = document.getElementById('horarioSelect');
    if (!servicoId || !data) return;

    select.innerHTML = '<option value="">Carregando...</option>';
    fetch('/agendamento/horarios-disponiveis?servicoId=' + servicoId + '&data=' + data)
        .then(r => r.json())
        .then(horarios => {
            if (horarios.length === 0) {
                select.innerHTML = '<option value="">Nenhum horário disponível neste dia</option>';
                return;
            }
            select.innerHTML = '<option value="">Selecione um horário</option>';
            horarios.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h;
                opt.textContent = h;
                select.appendChild(opt);
            });
        });
}

document.getElementById('dataInput').addEventListener('change', atualizarHorarios);
</script>
</body>
</html>
